<style>
:root{
  --bg:#0f0f0f;--sf:#171717;--s2:#1c1c1c;--s3:#222;--s4:#292929;--s5:#303030;
  --br:#252525;--br2:#2f2f2f;--br3:#3a3a3a;
  --ac:#c8a96e;--ac2:#e8c98e;--ac3:#a88040;--ac-on:#0f0f0f;
  --tx:#f0ece4;--tx2:#e0dcd4;--tx3:#aaa;--mu:#8a8a8a;
  --ok:#5db87a;--okb:rgba(93,184,122,.12);
  --dn:#e05555;--dnb:rgba(224,85,85,.12);
  --wn:#e8a020;--wnb:rgba(232,160,32,.12);
  --in:#5b9bd5;--inb:rgba(91,155,213,.12);
  --pu:#9b72cf;--pub:rgba(155,114,207,.12);
}
[data-theme="light"]{
  --bg:#f5f5f0;--sf:#ffffff;--s2:#f0ede8;--s3:#e8e4de;--s4:#e0dbd4;--s5:#d8d2ca;
  --br:#d8d3cc;--br2:#ccc8c0;--br3:#b8b3ac;
  --ac:#7a5520;--ac2:#6a4518;--ac3:#9a7440;--ac-on:#ffffff;
  --tx:#1a1a1a;--tx2:#2a2a2a;--tx3:#444444;--mu:#777777;
  --ok:#3d8b57;--okb:rgba(61,139,87,.12);
  --dn:#bb3333;--dnb:rgba(187,51,51,.12);
  --wn:#b87800;--wnb:rgba(184,120,0,.12);
  --in:#3a70a0;--inb:rgba(58,112,160,.12);
  --pu:#6a4a9f;--pub:rgba(106,74,159,.12);
}
/* Кнопки с акцентным фоном — белый текст в светлой теме */
[data-theme="light"] .hbtn.pr,
[data-theme="light"] .new-btn,
[data-theme="light"] .bsave,
[data-theme="light"] .bp,
[data-theme="light"] .task-add button,
[data-theme="light"] .modal-btn.primary{color:#fff;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--tx);font-family:"Golos Text",sans-serif;font-size:14px;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--br3);border-radius:2px;}

/* HEADER */
.hdr{background:var(--sf);border-bottom:1px solid var(--br);padding:0 20px;padding-top:env(safe-area-inset-top);box-sizing:border-box;display:flex;align-items:center;gap:0;flex-shrink:0;height:calc(48px + env(safe-area-inset-top));}
.logo{font-family:"Bebas Neue",sans-serif;font-size:20px;letter-spacing:3px;color:var(--ac);cursor:pointer;padding-right:16px;border-right:1px solid var(--br2);}
.hdr-nav{display:flex;gap:0;padding:0 8px;}
.hn{background:none;border:none;color:var(--mu);padding:0 14px;font-family:"Golos Text",sans-serif;font-size:12px;cursor:pointer;height:48px;display:flex;align-items:center;gap:6px;border-bottom:2px solid transparent;transition:all .2s;letter-spacing:.2px;}
.hn:hover{color:var(--tx2);}
.hn.active{color:var(--ac);border-bottom-color:var(--ac);}
.hn .nbadge{background:var(--dn);color:#fff;border-radius:10px;padding:1px 5px;font-size:11px;font-weight:700;line-height:1.4;}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:6px;}
.syncbadge{font-size:11px;padding:0 8px;transition:color .3s;}
.hbtn{background:none;border:1px solid var(--br2);border-radius:5px;color:var(--mu);padding:5px 11px;font-family:"Golos Text",sans-serif;font-size:11px;cursor:pointer;transition:all .2s;white-space:nowrap;}
.hbtn:hover{border-color:var(--ac);color:var(--ac);}
.hbtn.pr{background:var(--ac);color:#0f0f0f;border-color:var(--ac);font-weight:700;}
.hbtn.pr:hover{background:var(--ac2);}

/* APP */
.app{flex:1;display:flex;overflow:hidden;}

/* SIDEBAR */
.sb{width:256px;background:var(--sf);border-right:1px solid var(--br);display:flex;flex-direction:column;flex-shrink:0;transition:width .25s;}
.sb.off{width:0;overflow:hidden;}
.sb-top{padding:12px 14px;border-bottom:1px solid var(--br);flex-shrink:0;}
.sb-search{position:relative;margin-bottom:8px;}
.sb-search input{width:100%;background:var(--s4);border:1px solid var(--br);border-radius:6px;padding:6px 10px 6px 30px;color:var(--tx);font-family:"Golos Text",sans-serif;font-size:12px;outline:none;transition:border-color .2s;}
.sb-search input:focus{border-color:var(--ac);}
.sb-search::before{content:"⌕";position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--mu);pointer-events:none;}
.sb-filters{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:8px;}
.sff{background:var(--s4);border:1px solid var(--br);border-radius:4px;padding:2px 7px;font-size:11px;color:var(--mu);cursor:pointer;transition:all .2s;letter-spacing:.3px;text-transform:uppercase;}
.sff:hover,.sff.on{background:rgba(200,169,110,.12);border-color:var(--ac);color:var(--ac);}
.new-btn{width:100%;background:var(--ac);color:#0f0f0f;border:none;border-radius:6px;padding:7px;font-family:"Golos Text",sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:background .2s;}
.new-btn:hover{background:var(--ac2);}
.sb-list{flex:1;overflow-y:auto;padding:5px;}
.oi{padding:9px 11px;border-radius:7px;cursor:pointer;border:1px solid transparent;transition:all .15s;margin-bottom:2px;position:relative;}
.oi:hover{background:var(--s3);border-color:var(--br2);}
.oi.on{background:var(--s3);border-color:var(--ac);}
.oi-top{display:flex;align-items:center;gap:5px;margin-bottom:3px;}
.oi-name{font-size:13px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.oi-sum{font-size:11px;color:var(--ac);font-weight:600;}
.oi-meta{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--mu);}
.oi-st{display:inline-flex;align-items:center;gap:3px;font-size:11px;text-transform:uppercase;letter-spacing:.6px;padding:1px 6px;border-radius:3px;font-weight:600;}
.oi-dot{width:4px;height:4px;border-radius:50%;flex-shrink:0;}
.oi-late{position:absolute;right:8px;top:8px;font-size:11px;color:var(--dn);font-weight:700;}
.sb-empty{padding:20px 14px;text-align:center;color:var(--mu);font-size:12px;line-height:1.7;}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;}

/* WELCOME */
.welcome{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:var(--mu);}
.welcome-logo{font-family:"Bebas Neue",sans-serif;font-size:64px;letter-spacing:8px;color:var(--br3);}

/* DASHBOARD */
.dash{flex:1;overflow-y:auto;padding:20px 24px;}
.dash-title{font-family:"Bebas Neue",sans-serif;font-size:26px;letter-spacing:3px;color:var(--tx3);margin-bottom:18px;}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
.stat-card{background:var(--sf);border:1px solid var(--br);border-radius:10px;padding:14px 16px;}
.stat-val{font-size:26px;font-weight:700;font-family:"Bebas Neue",sans-serif;letter-spacing:1px;margin-bottom:1px;}
.stat-label{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:1px;}
.stat-sub{font-size:11px;margin-top:3px;}
.sc-ac .stat-val{color:var(--ac);}
.sc-ok .stat-val{color:var(--ok);}
.sc-dn .stat-val{color:var(--dn);}
.sc-wn .stat-val{color:var(--wn);}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.dash-block{background:var(--sf);border:1px solid var(--br);border-radius:10px;padding:14px 16px;}
.db-title{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--ac);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}
.db-title a{color:var(--mu);font-size:11px;cursor:pointer;text-transform:none;letter-spacing:0;}
.db-title a:hover{color:var(--ac);}
.today-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--br);font-size:12px;}
.today-row:last-child{border-bottom:none;}
.tr-ic{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.tr-name{flex:1;font-weight:500;cursor:pointer;}
.tr-name:hover{color:var(--ac);}
.tr-badge{font-size:11px;font-weight:700;padding:2px 7px;border-radius:10px;}
.ev-row{display:flex;align-items:center;gap:7px;padding:6px 0;border-bottom:1px solid var(--br);font-size:11px;color:var(--tx2);}
.ev-row:last-child{border-bottom:none;}
.ev-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.ev-txt{flex:1;}
.ev-time{color:var(--mu);font-size:11px;}
.funnel-item{margin-bottom:7px;}
.fi-head{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px;}
.fi-bar{height:4px;background:var(--s4);border-radius:2px;overflow:hidden;}
.fi-fill{height:100%;border-radius:2px;transition:width .6s;}

/* KANBAN */
.kb-wrap{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.kb-bar{padding:9px 14px;border-bottom:1px solid var(--br);display:flex;align-items:center;gap:8px;flex-shrink:0;background:var(--sf);}
.kb-bar-title{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:1.5px;}
.view-sw{display:flex;gap:2px;margin-left:auto;}
.vsw{background:none;border:1px solid var(--br);border-radius:4px;color:var(--mu);padding:4px 10px;font-size:11px;cursor:pointer;font-family:"Golos Text",sans-serif;transition:all .2s;}
.vsw.on,.vsw:hover{border-color:var(--ac);color:var(--ac);}
.kb-board{flex:1;overflow-x:auto;overflow-y:hidden;display:flex;}
.kb-col{min-width:240px;max-width:240px;display:flex;flex-direction:column;border-right:1px solid var(--br);flex-shrink:0;overflow:hidden;}
.kb-col .kb-cards{flex:1;max-height:calc(100vh - 200px);}
.kb-col-hd{padding:9px 11px;background:var(--sf);border-bottom:1px solid var(--br);display:flex;align-items:center;gap:5px;flex-shrink:0;}
.kch-name{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;flex:1;}
.kch-cnt{background:var(--s4);border-radius:8px;padding:1px 6px;font-size:11px;color:var(--mu);font-weight:700;}
.kch-sum{font-size:11px;color:var(--ac);}
.kb-cards{overflow-y:auto;padding:6px;display:flex;flex-direction:column;gap:5px;min-height:80px;transition:background .2s;}
/* Карточки не сжимаются — фиксированная высота колонки со скроллом */
.kc{flex-shrink:0;}
.kb-col.dov .kb-cards{background:rgba(200,169,110,.04);border-radius:5px;}
.kc{background:var(--sf);border:1px solid var(--br);border-radius:7px;padding:9px 10px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden;}
.kc:hover{border-color:var(--ac);box-shadow:0 3px 12px rgba(0,0,0,.35);}
.kc.dragging{opacity:.45;transform:rotate(1.5deg);}
.kc.drag-over-card{border-color:var(--ac);border-style:dashed;background:rgba(200,169,110,.06);}
.kc-stripe{position:absolute;left:0;top:0;bottom:0;width:3px;}
.kc-name{font-size:13px;font-weight:700;margin-bottom:4px;padding-left:7px;}
.kc-addr{font-size:11px;color:var(--mu);margin-bottom:5px;padding-left:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.kc-tags{display:flex;gap:4px;padding-left:7px;flex-wrap:wrap;margin-bottom:2px;}
.ktag{display:inline-flex;align-items:center;font-size:11px;padding:2px 5px;border-radius:3px;font-weight:700;letter-spacing:.2px;}
.kt-sum{color:var(--ac);background:rgba(200,169,110,.12);}
.kt-late{color:var(--dn);background:var(--dnb);}
.kt-debt{color:var(--wn);background:var(--wnb);}
.kt-ok{color:var(--ok);background:var(--okb);}
.kt-today{color:var(--wn);background:var(--wnb);}
.kt-date{color:var(--mu);background:var(--s4);}
.kc-acts{display:flex;gap:3px;padding-left:7px;margin-top:6px;opacity:0;pointer-events:none;transition:opacity .15s;}
.kc:hover .kc-acts{opacity:1;pointer-events:auto;}
.kact{background:var(--s4);border:1px solid var(--br);border-radius:3px;color:var(--mu);padding:2px 6px;font-size:11px;cursor:pointer;transition:all .2s;font-family:"Golos Text",sans-serif;}
.kact:hover{border-color:var(--ac);color:var(--ac);}

/* TABLE VIEW */
.tbl-wrap{flex:1;overflow:auto;}
.dtbl{width:100%;border-collapse:collapse;font-size:12px;}
.dtbl th{background:var(--sf);border-bottom:1px solid var(--br);padding:9px 13px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--mu);font-weight:600;position:sticky;top:0;z-index:2;white-space:nowrap;cursor:pointer;}
.dtbl th:hover{color:var(--ac);}
.dtbl td{padding:9px 13px;border-bottom:1px solid var(--br);vertical-align:middle;}
.dtbl tr:hover td{background:var(--s2);}
.dtbl tr.sel td{background:rgba(200,169,110,.04);}

/* OBJECT VIEW */
.ov{flex:1;display:grid;grid-template-columns:var(--oc-width,370px) 1fr;overflow:hidden;}
.oc{background:var(--s2);border-right:1px solid var(--br);display:flex;flex-direction:column;overflow:hidden;position:relative;min-width:260px;max-width:600px;}
.oc-resizer{position:absolute;right:0;top:0;bottom:0;width:5px;cursor:col-resize;background:transparent;z-index:10;transition:background .15s;}
.oc-resizer:hover{background:var(--ac);}
.oc-hd{padding:11px 15px;border-bottom:1px solid var(--br);display:flex;align-items:center;gap:7px;flex-shrink:0;}
.oc-ttl{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--ac);flex:1;}
.tgl{background:var(--s4);border:1px solid var(--br);border-radius:4px;padding:3px 9px;color:var(--mu);font-family:"Golos Text",sans-serif;font-size:11px;cursor:pointer;transition:all .2s;}
.tgl.on{background:rgba(200,169,110,.18);border-color:var(--ac);color:var(--ac);}
.oc-body{flex:1;overflow-y:auto;}
.st-bar{padding:11px 15px;border-bottom:1px solid var(--br);background:var(--sf);flex-shrink:0;}
.st-lbl{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--mu);margin-bottom:5px;}
.st-sel{width:100%;background:var(--s4);border:1px solid var(--br);border-radius:6px;padding:7px 11px;color:var(--tx);font-family:"Golos Text",sans-serif;font-size:12px;font-weight:700;outline:none;cursor:pointer;}
.csec{border-bottom:1px solid var(--br);}
.csh{padding:9px 15px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
.csh:hover{background:rgba(255,255,255,.015);}
.csh-title{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--ac);}
.csh-tog{font-size:11px;color:var(--mu);transition:transform .2s;}
.csb{padding:11px 15px;}
.csb.off{display:none;}
.field{margin-bottom:8px;}
.field label{display:block;font-size:11px;color:var(--mu);margin-bottom:3px;}
.field input,.field select,.field textarea{width:100%;background:var(--s4);border:1px solid var(--br);border-radius:5px;padding:6px 9px;color:var(--tx);font-family:"Golos Text",sans-serif;font-size:12px;outline:none;transition:border-color .2s;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--ac);}
.field select option{background:var(--s3);}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;}
.chkgrp{display:flex;flex-direction:column;gap:5px;}
.chk{display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer;}
.chk input{accent-color:var(--ac);width:12px;height:12px;}
.fin-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px;}
.fcrd{background:var(--s4);border:1px solid var(--br);border-radius:7px;padding:9px 11px;}
.fcrd .fv{font-size:16px;font-weight:700;margin-bottom:1px;}
.fcrd .fl{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:.7px;}
.fcrd.fac .fv{color:var(--ac);}
.fcrd.fok .fv{color:var(--ok);}
.fcrd.fdn .fv{color:var(--dn);}
.fcrd.fwn .fv{color:var(--wn);}
.payprog{height:3px;background:var(--s3);border-radius:2px;overflow:hidden;margin:6px 0 3px;}
.payfill{height:100%;background:var(--ok);border-radius:2px;transition:width .5s;}
.datgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.dcrd{background:var(--s4);border:1px solid var(--br);border-radius:7px;padding:8px 10px;}
.dcrd .dl{font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--mu);margin-bottom:3px;}
.dcrd input{background:none;border:none;color:var(--tx);font-family:"Golos Text",sans-serif;font-size:12px;font-weight:600;outline:none;width:100%;padding:0;}
.dcrd.late{border-color:var(--dn);}
.dcrd.late .dl{color:var(--dn);}
.dcrd.tod{border-color:var(--wn);}
.dcrd.tod .dl{color:var(--wn);}
.svc-tbl{width:100%;border-collapse:collapse;margin-bottom:5px;}
.svc-tbl th{font-size:11px;color:var(--mu);text-align:left;padding:3px 2px;border-bottom:1px solid var(--br);}
.svc-tbl td{padding:2px;}

// Загружаем сохранённые настройки колонок или используем дефолтные
function loadStatuses(){
  try{
    const s=localStorage.getItem('px_statuses')||localStorage.getItem('px_statuses_backup');
    if(s){
      const arr=JSON.parse(s);
      if(Array.isArray(arr)&&arr.length) return arr;
    }
  }catch(e){}
  return DEFAULT_STATUSES.map(s=>({...s}));
}
function saveStatuses(){
  const data=JSON.stringify(STATUSES);
  localStorage.setItem('px_statuses',data);
  localStorage.setItem('px_statuses_backup',data);
  STATUSES.forEach(s=>{SM[s.id]=s;});
}
function exportColumns(){
  const code=btoa(unescape(encodeURIComponent(JSON.stringify(STATUSES))));
  navigator.clipboard?.writeText(code).then(()=>notify('ok','Колонки скопированы','Вставьте код на другом устройстве через «Импорт колонок»'))
    .catch(()=>{prompt('Скопируйте код вручную:',code);});
}
function importColumns(){
  const code=prompt('Вставьте код колонок:');
  if(!code)return;
  try{
    const st=JSON.parse(decodeURIComponent(escape(atob(code.trim()))));
    if(!Array.isArray(st)||!st.length)throw 0;
    STATUSES=st;saveStatuses();renderKB();
    notify('ok','Колонки обновлены','Импортировано '+st.length+' колонок');
  }catch{notify('err','Ошибка','Неверный код колонок');}
}

const PWD_HASH='58ccaa81e0e763d16b8dc11d040865436f1fb78c55756bbad04366837df1a09d';
const SESSION_KEY='px_auth_v1';

async function hashStr(s){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function doLogin(){
  const pwd=document.getElementById('loginPwd')?.value||'';
  const err=document.getElementById('loginErr');
  if(!pwd){if(err)err.textContent='Введите пароль';return;}
  const h=await hashStr(pwd);
  if(h===PWD_HASH){
    try{sessionStorage.setItem(SESSION_KEY,'1');}catch(e){}
    const ls=document.getElementById('loginScreen');
    if(ls){ls.style.opacity='0';ls.style.transition='opacity .4s';
      setTimeout(()=>{ls.style.display='none';},400);}
    init();
  }else{
    if(err){err.textContent='Неверный пароль';
      setTimeout(()=>{if(err)err.textContent='';},2000);}
    const inp=document.getElementById('loginPwd');
    if(inp){inp.style.borderColor='#e05555';
      setTimeout(()=>{inp.style.borderColor='';},1500);}
  }
}

function checkAuth(){

  try{ok=sessionStorage.getItem(SESSION_KEY)==='1';}catch(e){}

function setSS(s){
  const el=ge('syncbadge');if(!el)return;
  const m={idle:{t:'',c:'var(--mu)'},saving:{t:'⟳ Сохранение...',c:'var(--ac)'},saved:{t:'✓ Синхронизировано',c:'var(--ok)'},error:{t:'⚠ Ошибка',c:'var(--dn)'},loading:{t:'⟳ Загрузка...',c:'var(--ac)'}};
  const st=m[s]||m.idle;el.textContent=st.t;el.style.color=st.c;
}
async function pushSheets(){
  setSS('saving');
  try{
    const config={id:'__config__',statuses:STATUSES};
    const rows=[...DB.map(c=>[JSON.stringify(c)]),[JSON.stringify(config)]];
    const r=await fetch(GS,{method:'POST',body:JSON.stringify({action:'save_all',rows})});
    const d=await r.json();
    if(d.ok){setSS('saved');setTimeout(()=>setSS('idle'),3000);}else throw 0;
  }catch{setSS('error');}
}
async function pullSheets(){
  setSS('loading');
  try{
    const r=await fetch(GS+'?t='+Date.now());
    const d=await r.json();
    if(d.ok&&Array.isArray(d.data)&&d.data.length){
      const loaded=d.data.flat().filter(Boolean)
        .map(s=>{try{return JSON.parse(s);}catch{return null;}}).filter(Boolean);
      if(loaded.length){
        // Применяем конфиг колонок если есть
        const cfg=loaded.find(c=>c.id==='__config__');
        let cfgNote='';
        if(cfg&&Array.isArray(cfg.statuses)&&cfg.statuses.length){
          STATUSES=cfg.statuses;saveStatuses();cfgNote=' + колонки';
        }else{cfgNote=' (колонки: нет в базе)';}
        // Слияние по updatedAt: локальные объекты сохраняются, по id берём более свежую версию
        const merged=new Map(DB.map(c=>[c.id,c]));
        loaded.filter(c=>c.id!=='__config__').forEach(rc=>{
          if(!rc||!rc.id)return;
          const lc=merged.get(rc.id);
          if(!lc||(+rc.updatedAt||0)>=(+lc.updatedAt||0)) merged.set(rc.id,rc);
        });
        merged.delete('__config__');
        DB=Array.from(merged.values());
        // Сохраняем ТОЛЬКО в localStorage, без повторной отправки в Sheets
        try{localStorage.setItem('px_v2',JSON.stringify(DB));}catch(e){console.warn('save error:',e);}
        setSS('saved');setTimeout(()=>setSS('idle'),2000);
        renderList();
        if(VIEW==='kanban')renderKB();
        else if(VIEW==='dash')showDash();
        notify('ok','Синхронизация','Загружено '+DB.length+' объектов'+cfgNote);
        return;
      }
    }setSS('idle');
  }catch{setSS('error');}
}
function save(){
  // Integrity check before save
  if(!Array.isArray(DB)){console.error('DB is not array!');return;}
  DB.forEach(c=>{
    if(!c.id)c.id=Date.now().toString()+Math.random().toString(36).slice(2);
    if(!c.rows)c.rows=[];
    if(!c.tl)c.tl=[];
    if(!c.tasks)c.tasks=[];
    if(!c.files)c.files=[];
    if(!c.tags)c.tags=[];
    if(!c.status)c.status='lead';
    if(!c.type)c.type='fiz';
  });
  // Backup to secondary key (insurance)
  try{
    const prev=localStorage.getItem('px_v2');
    if(prev) localStorage.setItem('px_v2_backup',prev);
    localStorage.setItem('px_v2',JSON.stringify(DB));
  }catch(e){
    console.error('localStorage save failed:',e);
    notify('err','Хранилище переполнено','Не удалось сохранить локально. Удалите крупные файлы из объектов, чтобы освободить место.');
  }
  clearTimeout(SYNCT);SYNCT=setTimeout(pushSheets,1500);
}

let OC_W = parseInt(localStorage.getItem('px_oc_width')||'370');
function initResizer(){
  const resizer=ge('ocResizer');if(!resizer)return;
  let startX,startW;
  resizer.addEventListener('mousedown',e=>{
    startX=e.clientX;
    startW=ge('oc')?.offsetWidth||OC_W;
    document.addEventListener('mousemove',onDrag);
    document.addEventListener('mouseup',stopDrag);
    e.preventDefault();
  });
  function onDrag(e){
    const w=Math.min(600,Math.max(260,startW+(e.clientX-startX)));
    document.documentElement.style.setProperty('--oc-width',w+'px');
    OC_W=w;
  }
  function stopDrag(){
    document.removeEventListener('mousemove',onDrag);
    document.removeEventListener('mouseup',stopDrag);
    localStorage.setItem('px_oc_width',OC_W);
  }
}

function renderList(){

    const nm=[c.projectName,c.fio,c.orgName].filter(Boolean).join(' ').toLowerCase();

    const ad=(c.objAddr||c.addr||c.orgAddr||'').toLowerCase();
    const inn=(c.orgInn||'').toLowerCase();
    const num=(c.docNum||'').toLowerCase();
    const qn=q.replace(/\D/g,'');
    return nm.includes(q)||(!!qn&&ph.includes(qn))||ad.includes(q)||inn.includes(q)||num.includes(q);
  });
  if(FSTAT)items=items.filter(c=>c.status===FSTAT);

// Drag state
let DRAG_OVER_ID=null;

function kcDragStart(e,id){
  // Не перехватываем если тащим колонку (drag начат с .kch-drag)
  DRAGSRC=id;
  COL_DRAG_SRC=null; // сбрасываем колоночный drag
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',id);
  e.stopPropagation();
}
function kcDragEnd(e){
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.kc.drag-over-card').forEach(el=>el.classList.remove('drag-over-card'));
  DRAG_OVER_ID=null;
}
function kcDragOver(e){
  e.preventDefault();e.stopPropagation();
  e.dataTransfer.dropEffect='move';
  const card=e.currentTarget;
  if(card.dataset.id!==DRAGSRC){
    document.querySelectorAll('.kc.drag-over-card').forEach(el=>el.classList.remove('drag-over-card'));
    card.classList.add('drag-over-card');
    DRAG_OVER_ID=card.dataset.id;
  }
}
function kcDrop(e,targetId,targetStatus){
  e.preventDefault();e.stopPropagation();
  document.querySelectorAll('.kb-col.dov').forEach(el=>el.classList.remove('dov'));
  document.querySelectorAll('.kc.drag-over-card').forEach(el=>el.classList.remove('drag-over-card'));
  if(!DRAGSRC)return;
  const src=DB.find(c=>c.id===DRAGSRC);
  if(!src)return;
  if(targetId&&targetId!==DRAGSRC){
    // Sort within column or move to new column
    const target=DB.find(c=>c.id===targetId);
    if(!target)return;
    // Move status if needed
    if(src.status!==targetStatus){
      const oldL=gst(src).label;
      src.status=targetStatus;
      log(src,`Статус: "${oldL}" → "${SM[targetStatus].label}"`, '🔄',SM[targetStatus].color);
    }
    // Reorder: insert src before target in DB array
    const srcIdx=DB.indexOf(src);
    const tgtIdx=DB.indexOf(target);
    DB.splice(srcIdx,1);
    const newTgt=DB.indexOf(target);
    DB.splice(newTgt,0,src);
    // Update sortOrder
    DB.filter(c=>c.status===targetStatus).forEach((c,i)=>{c.sortOrder=i;});
    save();renderKB();renderList();
  }
  DRAGSRC=null;
}
function kdrop(e,ns){
  e.preventDefault();
  ge('kc-'+ns)?.classList.remove('dov');
  // Если тащим колонку — не обрабатываем как карточку
  if(COL_DRAG_SRC) return;
  if(!DRAGSRC||!ns)return;
  const cl=DB.find(c=>c.id===DRAGSRC);if(!cl)return;
  if(cl.status!==ns){
    const oldL=gst(cl).label;cl.status=ns;
    log(cl,`Статус: "${oldL}" → "${SM[ns].label}"`, '🔄',SM[ns].color);
    save();renderKB();renderList();
  }
  DRAGSRC=null;
}

function sec(title,id,body){

}
function togSec(id){
  const b=ge('csb-'+id),t=ge('ctg-'+id);if(!b)return;
  b.classList.toggle('off');if(t)t.style.transform=b.classList.contains('off')?'rotate(-90deg)':'';

function renderRows(){
  const b=ge('rowbody');if(!b)return;
  b.innerHTML=EROWS.map((r,i)=>`<tr>
    <td><input value="${escA(r.name)}" oninput="EROWS[${i}].name=this.value;renderDocD()" placeholder="Название"></td>
    <td><input type="number" value="${escA(r.price)}" oninput="EROWS[${i}].price=this.value;renderDocD()" placeholder="0"></td>
    <td><input type="number" value="${r.qty||1}" min="0.01" step="0.01" oninput="EROWS[${i}].qty=this.value;renderDocD()"></td>
    <td><select onchange="EROWS[${i}].unit=this.value;renderDoc()">${UNITS.map(u=>`<option${u===r.unit?' selected':''}>${u}</option>`).join('')}</select></td>
    <td><button class="delbtn" onclick="rmRow(${i})">×</button></td>
  </tr>`).join('');
}
function addRow(){EROWS.push({name:'',price:'',qty:'1',unit:'шт.'});renderRows();renderDoc();}
function rmRow(i){EROWS.splice(i,1);renderRows();renderDoc();}
function syncRest(){const a=parseInt(ge('f_adv')?.value)||50;const r=ge('f_rest');if(r)r.value=100-a;}

// ═══════════════════════════════════════════════
// SYNC CARD → DB
// ═══════════════════════════════════════════════
function togTag(tid){
  const cl=DB.find(c=>c.id===CID);if(!cl)return;
  if(!cl.tags)cl.tags=[];
  const idx=cl.tags.indexOf(tid);
  if(idx>=0)cl.tags.splice(idx,1);else cl.tags.push(tid);
  cl.updatedAt=Date.now();save();
  // re-render just tags row
  const row=ge('tagsRow');
  if(row) row.innerHTML=TAGS.map(t=>`<span class="tag-pill ${cl.tags.includes(t.id)?'on':'off'}" style="color:${t.color};background:${cl.tags.includes(t.id)?t.color+'22':'transparent'};border-color:${t.color}" onclick="togTag('${t.id}')">${t.label}</span>`).join('');
}

function syncCard(){
  const cl=DB.find(c=>c.id===CID);if(!cl)return;
  cl.projectName=gv('f_projname');
  cl.docNum=gv('f_docNum');cl.docDate=gv('f_docDate');
  cl.w1=gcb('f_w1');cl.w2=gcb('f_w2');
  cl.dateMeasure=gv('f_dmeas');cl.dateProd=gv('f_dprod');
  cl.dateInstall=gv('f_dinst');cl.dateDead=gv('f_ddead');
  cl.startDays=gv('f_sddays');cl.execDays=gv('f_exdays');
  cl.brigades=[...document.querySelectorAll('.f_brig_cb:checked')].map(c=>c.value);
  delete cl.brigade;
  cl.advPct=gv('f_adv');cl.billDays=gv('f_bdays');
  cl.paid=gv('f_paid');cl.costPrice=gv('f_cost');cl.margin=gv('f_margin');
  cl.objAddr=gv('f_objaddr');cl.comment=gv('f_cmt');
  cl.rows=EROWS.map(r=>({...r}));
  cl.discount=gv('f_discount');
  if(cl.type==='fiz'){
    cl.fio=gv('f_fio');cl.passportSer=gv('f_psser');cl.passportNum=gv('f_psnum');
    cl.passportBy=gv('f_psby');cl.passportDate=gv('f_psdate');cl.passportCode=gv('f_pscode');
    cl.phone=gv('f_phone');cl.tg=gv('f_tg');cl.email=gv('f_email');cl.addr=gv('f_addr');
  }else{
    cl.orgForm=gv('f_orgform');cl.orgName=gv('f_orgname');
    cl.dirPost=gv('f_dirpost');cl.dirName=gv('f_dirname');cl.dirDoc=gv('f_dirdoc');
    cl.orgInn=gv('f_orginn');cl.orgKpp=gv('f_orgkpp');cl.orgOgrn=gv('f_orgogrn');
    cl.orgAddr=gv('f_orgaddr');cl.orgBank=gv('f_orgbank');
    cl.orgBik=gv('f_orgbik');cl.orgRs=gv('f_orgrs');cl.orgKs=gv('f_orgks');
    cl.orgPhone=gv('f_orgphone');cl.orgTg=gv('f_orgtg');cl.orgEmail=gv('f_orgemail');
  }
  cl.updatedAt=Date.now();
}
function onStChange(){
  const cl=DB.find(c=>c.id===CID);if(!cl)return;
  const ns=gv('f_status');if(ns===cl.status)return;
  const old=gst(cl).label;cl.status=ns;
  const st=gst(cl);ge('f_status').style.borderColor=st.color;
  log(cl,`Статус: "${old}" → "${st.label}"`, '🔄',st.color);
  save();renderList();
}
function autoSave(){
  clearTimeout(AUTOSAVE_T);
  AUTOSAVE_T=setTimeout(()=>{
    if(!CID)return;
    syncCard();
    save();
  },2000);
}
function saveObj(){
  clearTimeout(AUTOSAVE_T);
  syncCard();
  const cl=DB.find(c=>c.id===CID);
  if(cl)log(cl,'Карточка сохранена','💾','#888');
  save();renderList();
  const b=ge('svd');if(b){b.classList.add('show');setTimeout(()=>b.classList.remove('show'),2000);}
  notify('ok','Сохранено','Данные объекта обновлены');
}
function setType(t){
  const cl=DB.find(c=>c.id===CID);if(!cl)return;
  syncCard();cl.type=t;renderObjView(cl);
}
function delObj(){
  if(!confirm('Переместить объект в корзину?'))return;

function editTask(i){

  const t=cl.tasks[i];
  const newText=prompt('Изменить задачу:',t.text);

  if(newText.trim()) t.text=newText.trim();
  const newDate=prompt('Дата дедлайна (ГГГГ-ММ-ДД):',t.deadline||'');
  if(newDate!==null) t.deadline=newDate.trim();
  const newTime=prompt('Время (ЧЧ:ММ, или пусто):',t.time||'');
  if(newTime!==null) t.time=newTime.trim();

}
function editTaskInline(i,el){
  const cl=DB.find(c=>c.id===CID);if(!cl||!cl.tasks)return;
  el.contentEditable='true';el.focus();
  el.onblur=()=>{
    cl.tasks[i].text=el.innerText.trim()||cl.tasks[i].text;
    cl.updatedAt=Date.now();
    el.contentEditable='false';
    save();
  };

function addTask(){
  const cl=DB.find(c=>c.id===CID);if(!cl)return;

  const tm=ge('tdtime')?.value;
  if(!txt)return;if(!cl.tasks)cl.tasks=[];
  cl.tasks.push({text:txt,deadline:dl,time:tm||'',done:false,createdAt:Date.now()});
  log(cl,`Задача: "${txt}"`, '✅','#5b9bd5');
  save();renderTasks(cl);
}
function togTask(i){
  const cl=DB.find(c=>c.id===CID);if(!cl||!cl.tasks)return;
  cl.tasks[i].done=!cl.tasks[i].done;cl.updatedAt=Date.now();
  if(cl.tasks[i].done)log(cl,`Выполнена: "${cl.tasks[i].text}"`, '✅','#5db87a');
  save();renderTasks(cl);
}
function rmTask(i){
  const cl=DB.find(c=>c.id===CID);if(!cl||!cl.tasks)return;
  cl.tasks.splice(i,1);cl.updatedAt=Date.now();save();renderTasks(cl);
}

function procFiles(fl){
  const cl=DB.find(c=>c.id===CID);if(!cl)return;
  if(!cl.files)cl.files=[];
  Array.from(fl).forEach(file=>{
    const r=new FileReader();
    r.onload=e=>{
      cl.files.push({name:file.name,type:file.type,size:file.size,data:e.target.result,addedAt:Date.now()});
      log(cl,`Файл: "${file.name}"`, '📎','#9b72cf');
      save();renderFiles(cl);
    };r.readAsDataURL(file);
  });
}

function detectGender(fio){
  if(!fio||!fio.trim()) return 'unknown';
  const parts=fio.trim().split(/\s+/);
  const patronym=parts[2]||'';
  if(/ович$|евич$|ьич$/.test(patronym)) return 'male';
  if(/овна$|евна$|ична$|инична$/.test(patronym)) return 'female';
  const surname=parts[0]||'';
  if(/(?:ов|ев|ин|ын|ский|цкий|ной|зной)$/.test(surname)) return 'male';
  if(/(?:ова|ева|ина|ына|ская|цкая)$/.test(surname)) return 'female';
  return 'unknown';
}
function citizenLabel(fio){
  const g=detectGender(fio);
  if(g==='male')   return 'Гражданин Российской Федерации';
  if(g==='female') return 'Гражданка Российской Федерации';
  return 'Гражданин(ка) Российской Федерации';
}
function pl_rub(n){ const r=n%100,u=n%10; if(r>=11&&r<=14)return 'рублей'; if(u===1)return 'рубль'; if(u>=2&&u<=4)return 'рубля'; return 'рублей'; }
function pl_kop(n){ const r=n%100,u=n%10; if(r>=11&&r<=14)return 'копеек'; if(u===1)return 'копейка'; if(u>=2&&u<=4)return 'копейки'; return 'копеек'; }

function numWords(n){
  if(!n||isNaN(n)) return 'ноль';
  n=Math.floor(+n);
  if(n===0) return 'ноль';
  const ones_m=['','один','два','три','четыре','пять','шесть','семь','восемь','девять'];
  const ones_f=['','одна','две','три','четыре','пять','шесть','семь','восемь','девять'];
  const teens=['десять','одиннадцать','двенадцать','тринадцать','четырнадцать','пятнадцать','шестнадцать','семнадцать','восемнадцать','девятнадцать'];
  const tens=['','десять','двадцать','тридцать','сорок','пятьдесят','шестьдесят','семьдесят','восемьдесят','девяносто'];
  const hunds=['','сто','двести','триста','четыреста','пятьсот','шестьсот','семьсот','восемьсот','девятьсот'];
  function pl(x,f1,f2,f5){const r=x%100,u=x%10;if(r>=11&&r<=14)return f5;if(u===1)return f1;if(u>=2&&u<=4)return f2;return f5;}
  function g3(x,fem){let s='';const h=Math.floor(x/100),t=x%100,d=Math.floor(t/10),u=t%10;
    if(h)s+=hunds[h]+' ';
    if(t>=10&&t<20){s+=teens[t-10]+' ';}else{if(d)s+=tens[d]+' ';if(u)s+=(fem?ones_f:ones_m)[u]+' ';}
    return s;}
  let res='';
  const bil=Math.floor(n/1e9),mil=Math.floor((n%1e9)/1e6),thou=Math.floor((n%1e6)/1e3),rest=n%1e3;
  if(bil)res+=g3(bil,false)+pl(bil,'миллиард','миллиарда','миллиардов')+' ';
  if(mil)res+=g3(mil,false)+pl(mil,'миллион','миллиона','миллионов')+' ';
  if(thou)res+=g3(thou,true)+pl(thou%100>=11&&thou%100<=14?0:thou%10,'тысяча','тысячи','тысяч')+' ';
  if(rest)res+=g3(rest,false);
  return res.trim()||'ноль';
}
function cap(s){return s?s[0].toUpperCase()+s.slice(1):'';}
function rublesFull(n){
  const val=Math.round(+n*100)/100;
  const rub=Math.floor(val);
  const kop=Math.round((val-rub)*100);
  return cap(numWords(rub))+' '+pl_rub(rub)+' '+kop.toString().padStart(2,'0')+' '+pl_kop(kop);
}

    <div class="row"><span class="lbl"><b>3.2.</b> Расчёты между Сторонами производятся в нижеследующем порядке:</span></div>
    <div class="row"><span class="lbl">1) аванс в размере (${advPct}%) от общей цены, т.е. в сумме, равной:</span><span class="amt">${adv?fmt(adv):bl(80)} рублей;</span></div>
    <div class="row"><span class="lbl">2) итоговая оплата в размере (${restPct}%) от общей цены, т.е. в сумме, равной:</span><span class="amt">${rest?fmt(rest):bl(80)} рублей.</span></div>
  </div>
  <div class="cl">Оплата аванса осуществляется в день заключения настоящего Договора, итоговая оплата производится в срок не позднее обусловленного п. 4.1 Договора срока.</div>
  <div class="cl"><span class="n">3.3.</span> Общая цена работы, предусмотренная п. 3.1 Договора, является приблизительной. Любое превышение общей цены работы должно быть письменно согласовано с Заказчиком. Акт приёмки работы считается согласием Заказчика на превышение общей цены работы только при выполнении следующих условий: в Акте указана сумма превышения; в Акте отражена причина превышения; Акт подписан Заказчиком без замечаний по сумме превышения.</div>
  <div class="cl"><span class="n">3.4.</span> Издержки Подрядчика, понесённые им в связи с выполнением работы, согласованные с Заказчиком, но не указанные в Смете, не включаются в общую цену работы. Они возмещаются Заказчиком сверх цены работы на основании представленных Подрядчиком документов (Чеков), подтверждающих понесённые расходы. Срок возмещения издержек устанавливается равным <b>5 [пяти] банковским дням</b> с даты выставления Подрядчиком счёта на оплату издержек.</div>
  <div class="cl"><span class="n">3.5.</span> В случае, если Заказчик уклоняется от своевременной оплаты работы, в том числе перечисления суммы аванса, Подрядчик вправе не начинать работу либо приостановить её выполнение до момента полного исполнения Заказчиком соответствующих денежных обязательств.</div>
  <div class="cl"><span class="n">3.6.</span> Денежные обязательства Заказчика по оплате стоимости работ считаются исполненными с момента зачисления денежных средств на банковский счёт Подрядчика.</div>

  <div class="sh">Раздел 4.&nbsp; Сдача – приёмка работы</div>
  <div class="cl"><span class="n">4.1.</span> Заказчик обязан в течение <b>3 [трёх] календарных дней</b> с даты окончания работ с участием Подрядчика осмотреть и принять выполненную работу (её результат), а при обнаружении отступлений от Договора, ухудшающих результат работы, или иных недостатков в работе немедленно в тот же срок письменно заявить об этом Подрядчику с приложением доказательств, подтверждающих причинно-следственную связь между действиями (бездействием) Подрядчика и обнаруженными недостатками.<br>Результат выполненной работы сдаётся Заказчику по адресу объекта недвижимости: <b>${objAddr}</b>.</div>
  <div class="cl"><span class="n">4.2.</span> Дополнительного письменного извещения Заказчика о готовности работы к сдаче не требуется.</div>
  <div class="cl"><span class="n">4.3.</span> Письменный мотивированный отказ Заказчика в принятии результата работы должен содержать перечень несоответствий результата работы условиям настоящего Договора и Смете, а также предложение сроков для устранения выявленных недостатков в случае, если установлено, что недостатки возникли по обстоятельствам, за которые отвечает Подрядчик. Замечания Заказчика признаются мотивированными, если они содержат конкретные, непротиворечивые, технически выполнимые и однозначные формулировки.</div>
  <div class="cl ind"><span class="n">4.3.1.</span> Подрядчик при наличии оснований для удовлетворения требований Заказчика в отношении недостатков работы устраняет их в течение письменно согласованного с Заказчиком срока.</div>
  <div class="cl"><span class="n">4.4.</span> При уклонении Заказчика от принятия результата выполненной работы, в частности, по истечении предусмотренного п. 4.1 Договора срока, Акт выполненных работ, составленный и подписанный Подрядчиком в одностороннем порядке, считается надлежащим и достаточным подтверждением факта выполнения работ надлежащего качества и своевременно.</div>
  <div class="cl ind"><span class="n">4.4.1.</span> Во всех случаях прекращения Договора до приёмки результата выполненной работы Заказчик обязуется уплатить Подрядчику денежную сумму пропорционально объёму работы, выполненной до прекращения Договора, включая стоимость невостребованного материала (оборудования, иного имущества), а также вправе требовать передачи ему результата незавершённой работы при условии компенсации Подрядчику произведённых им затрат на её выполнение.</div>
  <div class="cl"><span class="n">4.5.</span> Одновременно со сдачей результата выполненной работы Подрядчик не обязуется передать Заказчику информацию, касающуюся эксплуатации или иного использования предмета договора.</div>

  <div class="sh">Раздел 5.&nbsp; Гарантия качества работы</div>
  <div class="cl"><span class="n">5.1.</span> На результат выполненной работы устанавливается гарантийный срок:
    <table class="gtab">
      <tr><td>на монтаж натяжного потолка</td><td class="dash">–</td><td><b>12</b> календарных месяцев;</td></tr>
      <tr><td>на монтаж электрокарниза</td><td class="dash">–</td><td><b>60</b> календарных месяцев;</td></tr>
      <tr><td>на полотно</td><td class="dash">–</td><td><b>60</b> календарных месяцев.</td></tr>
    </table>
  </div>
  <div class="cl"><span class="n">5.2.</span> Результат выполненной работы должен отвечать обычно предъявляемым к работам соответствующего рода требованиям к качеству, обеспечивающим его обычное использование по прямому назначению и в пределах разумного срока быть пригодным для обычного использования результата работ соответствующего рода. В отношении результата выполненной работы действуют технические условия эксплуатации, являющиеся неотъемлемым приложением к настоящему Договору.</div>
  <div class="cl"><span class="n">5.3.</span> Гарантийный срок исчисляется с момента передачи Заказчику результата выполненной работы по акту, а если акт не был подписан, то по истечении предусмотренного п. 4.1 Договора срока. Гарантийный срок не продлевается на время, в течение которого результат выполненной работы не мог использоваться из-за обнаруженных в нём недостатков. Начало течения гарантийного срока не откладывается в случае уклонения Заказчика от приёмки работ.</div>
  <div class="cl"><span class="n">5.4.</span> Заказчик вправе предъявить требования, связанные с недостатками работы, обнаруженными в течение гарантийного срока при условии, что результатом работы сохранены товарный вид, потребительские свойства, заводские ярлыки. По истечении гарантийного срока Подрядчик отвечает за недостатки работы, если Заказчик докажет, что они возникли до его передачи или по причинам, возникшим до этого момента.</div>
  <div class="cl"><span class="n">5.5.</span> Подрядчик не отвечает за недостатки работы, если их следствием явились:
    <div class="dlist">
      <div class="di">нарушение правил пользования, транспортирования или хранения;</div>
      <div class="di">естественный износ основного изделия и (или) комплектующих частей;</div>
      <div class="di">механическое или иное повреждение, в том числе в результате постороннего вмешательства или вскрытия, проникновения внутрь жидкости, пыли, посторонних предметов, подключения к нерекомендованным заводом-изготовителем электрическим и иным сетям, адаптерам;</div>
      <div class="di">действия (бездействие) Заказчика или третьих лиц либо обстоятельства непреодолимой силы, а также иные обстоятельства, за которые Подрядчик не отвечает.</div>
    </div>
  </div>
  <div class="cl"><span class="n">5.6.</span> Заказчик, обнаруживший, что работа выполнена Подрядчиком с отступлениями от Договора, ухудшившими результат работы, или с иными недостатками, которые делают его не пригодным для обычного использования, вправе потребовать от Подрядчика безвозмездного устранения недостатков работы в разумный срок.</div>
  <div class="cl ind"><span class="n">5.6.1.</span> Подрядчик вправе вместо устранения недостатков, за которые он отвечает, безвозмездно выполнить работу заново без возмещения Заказчику причинённых невозможностью использования результата выполненной работы убытков.</div>
  <div class="cl ind"><span class="n">5.6.2.</span> По требованиям в отношении недостатков работы Заказчик не вправе требовать соразмерного уменьшения или возврата покупной цены либо возмещения своих расходов на устранение недостатков работы либо на выполнение работы заново.</div>
  <div class="cl"><span class="n">5.7.</span> В случае существенного нарушения требований к качеству работы Заказчик вправе отказаться от исполнения Договора и потребовать возврата уплаченной за некачественную работу денежной суммы.</div>
  <div class="cl ind"><span class="n">5.7.1.</span> Стороны установили, что существенным нарушением требований к качеству работы является её выполнение с таким существенным недостатком, который имеет хотя бы один из следующих признаков:
    <div class="dlist">
      <div class="di">является неустранимым;</div>
      <div class="di">выявляется неоднократно либо проявляется вновь после устранения;</div>
      <div class="di">не может быть устранён без несоразмерных расходов или затрат времени.</div>
    </div>
  </div>
  <div class="cl"><span class="n">5.8.</span> На результат работы, в отношении которого Подрядчиком безвозмездно устранены недостатки в порядке, установленном п. 5.5 Договора, не устанавливается новый гарантийный срок.</div>
  <div class="cl"><span class="n">5.9.</span> В течение срока гарантии Заказчику запрещено вскрывать, самостоятельно ремонтировать и осуществлять иные действия в отношении результата выполненной работы. Устранение недостатков работы осуществляется Подрядчиком. В случае устранения недостатков работы силами третьих лиц гарантия Подрядчика прекращается.</div>

  <div class="sh">Раздел 6.&nbsp; Ответственность сторон</div>
  <div class="cl"><span class="n">6.1.</span> В случае нарушения Подрядчиком обязательств по Договору Заказчик вправе требовать возмещения только реального ущерба. Упущенная выгода возмещению не подлежит. Убытки, причинённые Заказчику неисполнением или ненадлежащим исполнением Подрядчиком его обязательств по Договору, подлежат возмещению в сумме, не превышающей общую цену работ.</div>
  <div class="cl"><span class="n">6.2.</span> В случае просрочки выполнения или сдачи результата работы Заказчик вправе требовать уплаты неустойки в размере 0,1% суммы невыполненной работы за каждый день просрочки.</div>
  <div class="cl"><span class="n">6.3.</span> В случае просрочки оплаты выполняемых работ Подрядчик вправе потребовать уплаты процентов на сумму долга в размере ключевой ставки Банка России, действовавшей в соответствующие периоды, за каждый день просрочки до уплаты суммы основного долга. Подрядчик вправе потребовать от Заказчика возмещения убытков, включая упущенную выгоду, в полной сумме сверх процентов.</div>
  <div class="cl"><span class="n">6.4.</span> В случае невозможности исполнения, возникшей по вине Заказчика, работы подлежат оплате в полном объёме. В случае одностороннего отказа Заказчика от исполнения Договора, а также когда невозможность исполнения возникла по обстоятельствам, за которые ни одна из Сторон не отвечает, Заказчик обязан оплатить Подрядчику работу, выполненную до такого отказа или наступления таких обстоятельств, повлекших невозможность дальнейшего исполнения, и компенсировать стоимость невостребованного материала (оборудования, иного имущества).</div>

  <div class="sh">Раздел 7.&nbsp; Обстоятельства непреодолимой силы</div>
  <div class="cl"><span class="n">7.1.</span> Стороны освобождаются от ответственности за частичное или полное неисполнение обязательств по настоящему Договору, если это неисполнение явилось следствием обстоятельств непреодолимой силы, возникших после заключения настоящего Договора в результате обстоятельств чрезвычайного характера, которые Стороны не могли предвидеть или предотвратить.</div>
  <div class="cl ind"><span class="n">7.1.1.</span> К обстоятельствам непреодолимой силы не относятся, в частности: предпринимательские, финансовые и информационные риски, нарушение обязанностей со стороны контрагентов должника, отсутствие на рынке нужных для исполнения товаров, работ или услуг, отсутствие у должника необходимых денежных средств, его неплатёжеспособность, финансово-экономический кризис, запрет торговых операций, в том числе с отдельными странами, принятие международных санкций, изменение валютного курса, девальвация национальной валюты, преступные действия неустановленных лиц, распространение коронавирусной или иной инфекции, отключение дата-центров, находящихся на территории Российской Федерации, от глобальной сети «Интернет», блокировка серверов или сетевых соединений со стороны надзорных органов и другие подобные обстоятельства.</div>
  <div class="cl"><span class="n">7.2.</span> При наступлении обстоятельств, указанных в п. 7.1 настоящего Договора, каждая Сторона должна без промедления известить о них в письменном виде другую Сторону. Извещение должно содержать данные о характере обстоятельств, а также официальные документы, удостоверяющие наличие этих обстоятельств и по возможности дающие оценку их влияния на возможность исполнения Стороной своих обязательств по настоящему Договору.</div>
  <div class="cl"><span class="n">7.3.</span> Неуведомление или несвоевременное уведомление лишает соответствующую Сторону права ссылаться на обстоятельства непреодолимой силы как на основание, освобождающее от ответственности за невыполнение обязательств по настоящему Договору. Надлежащим доказательством будут служить свидетельства уполномоченных государственных органов.</div>
  <div class="cl"><span class="n">7.4.</span> В случае наступления обстоятельств, предусмотренных в п. 7.1 настоящего Договора, срок исполнения Стороной обязательств по настоящему Договору отодвигается соразмерно времени, в течение которого действуют эти обстоятельства и их последствия. Если наступившие обстоятельства, перечисленные в п. 7.1 настоящего Договора, и их последствия продолжают действовать <b>1 [один] календарный месяц и более</b>, Стороны проводят дополнительные переговоры для выявления приемлемых альтернативных способов исполнения настоящего Договора либо его расторжения.</div>

  <div class="sh">Раздел 8.&nbsp; Срок действия договора, порядок изменения и расторжения</div>
  <div class="cl"><span class="n">8.1.</span> Настоящий Договор вступает в силу с момента подписания его обеими Сторонами либо обмена его копиями с использованием технического средства (электронная почта, мессенджер, система ЭДО) и действует до сдачи результата выполненной работы, но в любом случае до полного исполнения Сторонами их обязательств по Договору.</div>
  <div class="cl"><span class="n">8.2.</span> Во всех случаях, когда Подрядчик не в состоянии исполнить свои обязательства по Договору вследствие просрочки исполнения Заказчиком его обязательств или обязанностей по Договору либо вследствие действий третьих лиц или обстоятельств непреодолимой силы, сроки выполнения работ продлеваются соразмерно времени просрочки исполнения Заказчика либо до прекращения совершения третьими лицами действий (бездействия), препятствующих выполнению работ или создающих такую угрозу, либо до истечения срока действия обстоятельств непреодолимой силы.</div>
  <div class="cl"><span class="n">8.3.</span> Договор может быть изменён или расторгнут по взаимному соглашению сторон.</div>
  <div class="cl"><span class="n">8.4.</span> Односторонний отказ от исполнения Договора (полный или частичный) или одностороннее его изменение допускаются во внесудебном порядке в случае существенного нарушения Договора.</div>
  <div class="cl ind"><span class="n">8.4.1.</span> Нарушение договора Подрядчиком предполагается существенным в случае нарушения предусмотренных п.п. 1.4.1 и 1.4.2 Договора сроков более чем на <b>10 [десять] рабочих дней</b>.</div>
  <div class="cl ind"><span class="n">8.4.2.</span> Нарушение Договора Заказчиком предполагается существенным в случае нарушения Заказчиком сроков оплаты работ более чем на <b>5 [пять] банковских дней</b> или <b>более 2 [двух] раз подряд</b> в период действия настоящего Договора.</div>
  <div class="cl"><span class="n">8.5.</span> По требованию одной из сторон Договор может быть изменён или расторгнут по решению суда только в иных случаях, предусмотренных Гражданским кодексом РФ или другими законами. Сторона, которой законом или Договором предоставлено право на одностороннее изменение или право на отказ от Договора (исполнения Договора), должна при осуществлении этого права действовать добросовестно и разумно в пределах, предусмотренных законом или настоящим Договором.</div>

// COLUMN MANAGEMENT
// ═══════════════════════════════════════════════

let COL_DRAG_SRC = null;
const COL_COLORS = [
  '#888','#5b9bd5','#9b72cf','#c8a96e','#e8a020',
  '#5db87a','#e05555','#e8709a','#4db8b8','#b8a44d',
];

// ── Drag колонок ──────────────────────────────
function colDragStart(e, colId){
  // Если тащат карточку — не перехватываем
  if(DRAGSRC){ e.preventDefault(); return; }
  e.dataTransfer.types; // trigger
  e.dataTransfer.setData('col-drag', colId);
  COL_DRAG_SRC = colId;
  setTimeout(()=>{
    const el = document.querySelector(`[data-col-id="${colId}"]`);
    if(el) el.classList.add('col-dragging');
  }, 0);
}
function colDragEnd(e){
  COL_DRAG_SRC = null;
  document.querySelectorAll('.kb-col').forEach(el=>{
    el.classList.remove('col-dragging','col-drag-over');
  });
}
function colDragOver(e, colId){
  if(!COL_DRAG_SRC || COL_DRAG_SRC === colId) return;
  e.preventDefault();
  e.stopPropagation();
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.kb-col').forEach(el=>el.classList.remove('col-drag-over'));
  const el = document.querySelector(`[data-col-id="${colId}"]`);
  if(el) el.classList.add('col-drag-over');
}
function colDragLeave(e, colId){
  const el = document.querySelector(`[data-col-id="${colId}"]`);
  if(el && !el.contains(e.relatedTarget)) el.classList.remove('col-drag-over');
}
function colDrop(e, targetColId){
  e.preventDefault(); e.stopPropagation();
  document.querySelectorAll('.kb-col').forEach(el=>{
    el.classList.remove('col-dragging','col-drag-over','dov');
  });
  // Если это дроп карточки — передаём дальше
  const cardId = e.dataTransfer.getData('text/plain');
  if(cardId && !COL_DRAG_SRC){
    kdrop(e, targetColId);
    return;
  }
  if(!COL_DRAG_SRC || COL_DRAG_SRC === targetColId){ COL_DRAG_SRC=null; return; }
  // Переставляем колонки
  const srcIdx = STATUSES.findIndex(s=>s.id===COL_DRAG_SRC);
  const tgtIdx = STATUSES.findIndex(s=>s.id===targetColId);
  if(srcIdx<0||tgtIdx<0){ COL_DRAG_SRC=null; return; }
  const [moved] = STATUSES.splice(srcIdx,1);
  STATUSES.splice(tgtIdx,0,moved);
  saveStatuses();
  COL_DRAG_SRC = null;
  renderKB();
}

// ── Переименование (двойной клик) ─────────────
function kbEditColName(colId){
  const st = STATUSES.find(s=>s.id===colId);
  if(!st) return;

// IMPORT JSON
// ═══════════════════════════════════════════════
function importJSON(){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='.json';
  inp.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!Array.isArray(data))throw new Error('Не массив');
        // Deduplicate: merge by id
        const existing=new Map(DB.map(c=>[c.id,c]));
        let added=0,updated=0;
        data.forEach(c=>{
          if(!c||!c.id)return;
          if(existing.has(c.id)){updated++;}else{added++;}
          existing.set(c.id,c);
        });
        DB=Array.from(existing.values());
        save();renderList();
        notify('ok','Импорт',`Добавлено: ${added}, обновлено: ${updated}`);
      }catch(err){notify('err','Ошибка импорта',err.message);}
    };
    reader.readAsText(file);
  };
  inp.click();
}

// ═══════════════════════════════════════════════
let tableSortField='';let tableSortDir=1;
function sortTable(field){
  if(tableSortField===field){tableSortDir*=-1;}else{tableSortField=field;tableSortDir=1;}
  showTable();
}
function getSortedDB(){
  if(!tableSortField)return liveDB();
  return [...liveDB()].sort((a,b)=>{
    let va,vb;
    if(tableSortField==='name'){va=cname(a);vb=cname(b);return va.localeCompare(vb)*tableSortDir;}
    if(tableSortField==='status'){va=a.status||'';vb=b.status||'';return va.localeCompare(vb)*tableSortDir;}
    if(tableSortField==='total'){va=ctotal(a.rows);vb=ctotal(b.rows);return(va-vb)*tableSortDir;}
    return 0;
  });
}

function showAllTasks(){
  VIEW='tasks';setNav('tasks');sbHide();
  const mc=ge('main');
  renderAllTasksView(mc);
}

function renderAllTasksView(mc){
  const today=new Date().toISOString().split('T')[0];
  // Собираем все задачи со всех объектов
  let allTasks=[];
  liveDB().forEach(cl=>{
    (cl.tasks||[]).forEach((t,i)=>{
      allTasks.push({...t,_cid:cl.id,_cname:cname(cl),_idx:i,_status:cl.status});
    });
  });

  // Фильтры
  const filterDone=ge('tf-done')?.checked;
  const filterQ=(ge('tf-search')?.value||'').toLowerCase();

  let filtered=allTasks;
  if(!filterDone) filtered=filtered.filter(t=>!t.done);
  if(filterQ) filtered=filtered.filter(t=>
    (t.text||'').toLowerCase().includes(filterQ)||
    t._cname.toLowerCase().includes(filterQ)
  );

  // Группировка
  const overdue=filtered.filter(t=>!t.done&&t.deadline&&isLate(t.deadline));
  const todayT=filtered.filter(t=>!t.done&&t.deadline===today);
  const upcoming=filtered.filter(t=>!t.done&&t.deadline&&t.deadline>today);
  const nodate=filtered.filter(t=>!t.done&&!t.deadline);
  const done=filtered.filter(t=>t.done);

  function taskRow(t){
    const lateCls=!t.done&&t.deadline&&isLate(t.deadline)?' style="border-left:3px solid var(--dn);padding-left:10px"':'';
    const todayCls=!t.done&&t.deadline===today?' style="border-left:3px solid var(--wn);padding-left:10px"':'';
    return`<div class="at-row"${lateCls||todayCls}>
      <input type="checkbox" class="tchk" ${t.done?'checked':''}
        onchange="quickToggleTask('${t._cid}',${t._idx})">
      <div class="at-body">
        <div class="ttxt${t.done?' done':''}">${esc(t.text)}</div>
        <div style="display:flex;gap:10px;margin-top:2px;flex-wrap:wrap">
          <span class="at-obj" onclick="openObj('${t._cid}')">${esc(t._cname)}</span>
          ${t.deadline?`<span class="tdl${!t.done&&isLate(t.deadline)?' late':''}">${fds(t.deadline)}${t.time?' '+t.time:''}</span>`:''}
        </div>
      </div>
      <button class="kact" onclick="openObj('${t._cid}')" style="font-size:10px;padding:3px 7px;flex-shrink:0">→</button>
    </div>`;
  }

  function section(title,color,tasks){
    if(!tasks.length)return'';
    return`<div class="at-section">
      <div class="at-sec-hd" style="color:${color}">
        <span>${title}</span><span class="at-cnt">${tasks.length}</span>
      </div>
      ${tasks.map(taskRow).join('')}
    </div>`;
  }

  mc.innerHTML=`<div class="dash fade-in" style="overflow-y:auto;flex:1;padding:16px 20px">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;color:var(--tx3)">ЗАДАЧИ</div>
      <div style="position:relative;flex:1;min-width:160px;max-width:280px">
        <input id="tf-search" placeholder="⌕ Поиск по задачам..." oninput="renderAllTasksView(ge('main'))"
          style="width:100%;background:var(--s4);border:1px solid var(--br2);border-radius:6px;padding:6px 10px;color:var(--tx);font-family:'Golos Text',sans-serif;font-size:12px;outline:none;">
      </div>
      <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--tx2);cursor:pointer">
        <input type="checkbox" id="tf-done" onchange="renderAllTasksView(ge('main'))" style="accent-color:var(--ac)">
        Показать выполненные
      </label>
      <button class="vsw" onclick="showAddTaskModal()" style="margin-left:auto">+ Новая задача</button>
    </div>

    ${filtered.length===0?`<div style="color:var(--mu);text-align:center;padding:40px;font-size:14px">
      ${allTasks.filter(t=>!t.done).length===0?'✅ Все задачи выполнены!':'Задач не найдено'}
    </div>`:''}

    ${section('⚠ Просрочено','var(--dn)',overdue)}
    ${section('📅 Сегодня','var(--wn)',todayT)}
    ${section('🔜 Предстоящие','var(--in)',upcoming)}
    ${section('📋 Без даты','var(--mu)',nodate)}
    ${done.length&&filterDone?section('✓ Выполненные','var(--ok)',done):''}
  </div>`;
}

function quickToggleTask(cid,idx){
  const cl=DB.find(c=>c.id===cid);if(!cl||!cl.tasks)return;
  cl.tasks[idx].done=!cl.tasks[idx].done;cl.updatedAt=Date.now();
  if(cl.tasks[idx].done) log(cl,`Задача выполнена: "${cl.tasks[idx].text}"`, '✅','#5db87a');
  save();
  renderAllTasksView(ge('main'));
}

  if(!overlay||!mc2)return;
  mc2.innerHTML=`<h3>Новая задача</h3>
    <div class="field"><label>Задача</label><input id="atText" placeholder="Что нужно сделать..."></div>
    <div class="field"><label>Объект</label>
      <select id="atObj">

        ${liveDB().map(c=>`<option value="${c.id}">${cname(c)}</option>`).join('')}

    <div class="fr">

function saveNewTask(){
  const text=ge('atText')?.value?.trim();
  const cid=ge('atObj')?.value;
  const date=ge('atDate')?.value;
  const time=ge('atTime')?.value;

// ═══════════════════════════════════════════════
// ПЛАНИРОВЩИК БРИГАД (диаграмма Ганта)
// ═══════════════════════════════════════════════
let PLAN_START=null;
let PLAN_DAYS=(window.innerWidth<=768?7:14);
let PLAN_DRAG=null;
let PLAN_QA=null;
const PL_WD=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
const PL_MG=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];

function plISO(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function plParse(s){return new Date(s+'T00:00:00');}
function plAddDays(iso,n){const d=plParse(iso);d.setDate(d.getDate()+n);return plISO(d);}
function plDiff(a,b){return Math.round((plParse(b)-plParse(a))/864e5);}
function plDefaultStart(){const d=new Date();const dow=(d.getDay()+6)%7;d.setDate(d.getDate()-dow);return plISO(d);}
function plBrigKey(i){return(i>=0&&i<BRIGADES.length)?BRIGADES[i]:'';}
function plLabel(iso){const d=plParse(iso);return d.getDate()+' '+PL_MG[d.getMonth()];}

function showPlanner(){
  VIEW='planner';setNav('plan');sbHide();
  if(!PLAN_START)PLAN_START=plDefaultStart();
  renderPlanner();
}

function renderPlanner(){
  const mc=ge('main');if(!mc)return;
  const mob=window.innerWidth<=768;
  const COL=mob?32:46, LBL=mob?84:130, BH=30, GAP=4;
  if(PLAN_DAYS>14&&mob)PLAN_DAYS=7;
  const todayISO=plISO(new Date());
  const days=[];for(let i=0;i<PLAN_DAYS;i++)days.push(plAddDays(PLAN_START,i));
  const laneW=PLAN_DAYS*COL;

  // строки: бригады + «Без бригады»
  const rows=BRIGADES.map((b,i)=>({idx:i,key:b,label:b,none:false}));
  rows.push({idx:BRIGADES.length,key:'',label:'Без бригады',none:true});

  // объекты по бригадам
  let totalConf=0;
  const byRow={};rows.forEach(r=>byRow[r.key]=[]);
  liveDB().forEach(cl=>{
    if(!cl.dateInstall)return;
    const start=cl.dateInstall;
    let end=(cl.dateDead&&cl.dateDead>=start)?cl.dateDead:start;
    const sTrue=plDiff(PLAN_START,start), eTrue=plDiff(PLAN_START,end);
    if(eTrue<0||sTrue>PLAN_DAYS-1)return; // вне окна
    const keys=clBrigs(cl);
    if(keys.length){keys.forEach(k=>byRow[k].push({cl,start,end,sTrue,eTrue}));}
    else byRow[''].push({cl,start,end,sTrue,eTrue}); // без бригады
  });

  // раскладка по подстрокам (greedy) + конфликты
  function layout(items){
    const sorted=items.slice().sort((a,b)=>a.sTrue-b.sTrue||a.eTrue-b.eTrue);
    const ends=[];
    sorted.forEach(it=>{
      let r=0;while(r<ends.length&&ends[r]>=it.sTrue)r++;
      it.lane=r;ends[r]=it.eTrue;it.conf=false;
    });
    // конфликты: пересекающиеся пары
    for(let i=0;i<sorted.length;i++)for(let j=0;j<i;j++){
      if(sorted[j].sTrue<=sorted[i].eTrue&&sorted[i].sTrue<=sorted[j].eTrue){
        totalConf++;sorted[i].conf=true;sorted[j].conf=true;
      }
    }
    return{items:sorted,lanes:Math.max(1,ends.length)};
  }
  const laid={};rows.forEach(r=>laid[r.key]=layout(byRow[r.key]));

  // ── разметка ──
  const dayHead=days.map(iso=>{
    const d=plParse(iso),dow=(d.getDay()+6)%7,we=dow>=5,tod=iso===todayISO;
    return`<div class="pl-dcell${we?' we':''}${tod?' tod':''}"><div class="pl-dnum">${d.getDate()}</div>${PL_WD[dow]}</div>`;
  }).join('');

  const rowsHTML=rows.map(r=>{
    const lo=laid[r.key];
    const rowH=lo.lanes*(BH+GAP)+GAP;
    const cells=days.map(iso=>{
      const d=plParse(iso),dow=(d.getDay()+6)%7,we=dow>=5,tod=iso===todayISO;
      return`<div class="pl-cell${we?' we':''}${tod?' tod':''}" onclick="plCellClick(${r.idx},'${iso}')"></div>`;
    }).join('');
    const blocks=lo.items.map(it=>{
      const cl=it.cl,st=gst(cl);
      const lft=Math.max(0,it.sTrue)*COL+2;
      const rIdx=Math.min(PLAN_DAYS-1,it.eTrue);
      const w=(rIdx-Math.max(0,it.sTrue)+1)*COL-4;
      const top=it.lane*(BH+GAP)+GAP;
      const nm=cname(cl);
      const lbl=w<50?esc(nm.slice(0,3)):esc(nm);
      const tip=escA(`${nm} · ${fds(it.start)}–${fds(it.end)} · ${st.label} · ${r.label}`);
      return`<div class="pl-block${it.conf?' conf':''}" draggable="true" title="${tip}"
        style="left:${lft}px;top:${top}px;width:${Math.max(COL-4,w)}px;height:${BH}px;background:${st.color}"
        onclick="event.stopPropagation();openObj('${cl.id}')"
        ondragstart="plBlockDragStart(event,'${cl.id}',${COL},${r.idx})" ondragend="plBlockDragEnd(event)">${lbl}</div>`;
    }).join('');
    return`<div class="pl-row">
      <div class="pl-rowlabel${r.none?' none':''}"${r.none?'':` ondblclick="plRenameBrigade(${r.idx})" title="Двойной клик — переименовать"`}>${esc(r.label)}</div>
      <div class="pl-lane" data-brigidx="${r.idx}" style="flex:0 0 ${laneW}px;width:${laneW}px;height:${rowH}px"
        ondragover="plLaneOver(event)" ondrop="plDrop(event,this,${COL})">${cells}${blocks}</div>
    </div>`;
  }).join('');

  const period=plLabel(days[0])+' — '+plLabel(days[PLAN_DAYS-1]);
  const segs=mob?[[7,'Неделя'],[14,'2 недели']]:[[14,'2 недели'],[28,'4 недели'],[30,'Месяц']];
  mc.innerHTML=`<div class="pl-wrap fade-in" style="--pl-col:${COL}px;--pl-lbl:${LBL}px">
    <div class="pl-bar">
      <button class="pl-nav-btn" onclick="plShift(-1)">◀</button>
      <div class="pl-period">${period}</div>
      <button class="pl-nav-btn" onclick="plShift(1)">▶</button>
      <button class="vsw" onclick="plToday()">Сегодня</button>
      <div class="pl-seg">${segs.map(s=>`<button class="${PLAN_DAYS===s[0]?'on':''}" onclick="plSetDays(${s[0]})">${s[1]}</button>`).join('')}</div>
      <div class="pl-conf${totalConf?'':' ok'}">${totalConf?('⚠ Конфликтов: '+totalConf):'✓ Без конфликтов'}</div>
    </div>
    <div class="pl-grid">
      <div class="pl-head"><div class="pl-corner">Бригада</div><div class="pl-days" style="width:${laneW}px">${dayHead}</div></div>
      ${rowsHTML}
    </div>
  </div>`;
}

function plShift(dir){PLAN_START=plAddDays(PLAN_START,dir*PLAN_DAYS);renderPlanner();}
function plToday(){PLAN_START=plDefaultStart();renderPlanner();}
function plSetDays(n){PLAN_DAYS=n;renderPlanner();}

function plRenameBrigade(idx){
  if(idx<0||idx>=BRIGADES.length)return;
  const old=BRIGADES[idx];
  const nn=prompt('Название бригады:',old);
  if(nn==null)return;
  const name=nn.trim();
  if(!name||name===old)return;
  if(BRIGADES.includes(name)){notify('warn','Уже существует','Бригада с таким названием есть');return;}
  DB.forEach(c=>{
    if(Array.isArray(c.brigades))c.brigades=c.brigades.map(b=>b===old?name:b);
    if(c.brigade===old)c.brigade=name;
  });
  BRIGADES[idx]=name;saveBrigades();save();renderPlanner();renderList();
  notify('ok','Переименовано',old+' → '+name);
}

function plBlockDragStart(e,id,COL,srcIdx){
  const rect=e.currentTarget.getBoundingClientRect();
  const grab=Math.max(0,Math.floor((e.clientX-rect.left)/COL));
  PLAN_DRAG={id,grab,srcIdx};
  e.dataTransfer.effectAllowed='move';
  try{e.dataTransfer.setData('text/plain',id);}catch(_){}
  e.currentTarget.classList.add('dragging');
}
function plBlockDragEnd(e){e.currentTarget.classList.remove('dragging');PLAN_DRAG=null;}
function plLaneOver(e){e.preventDefault();e.dataTransfer.dropEffect='move';}
function plDrop(e,lane,COL){
  e.preventDefault();
  if(!PLAN_DRAG)return;
  const cl=DB.find(c=>c.id===PLAN_DRAG.id);if(!cl){PLAN_DRAG=null;return;}
  const rect=lane.getBoundingClientRect();
  let idx=Math.floor((e.clientX-rect.left)/COL)-PLAN_DRAG.grab;
  idx=Math.max(0,Math.min(PLAN_DAYS-1,idx));
  const tgtBrig=plBrigKey(+lane.dataset.brigidx);
  const srcBrig=plBrigKey(PLAN_DRAG.srcIdx);
  const oldStart=cl.dateInstall;
  const oldStartIdx=plDiff(PLAN_START,oldStart);
  const dur=(cl.dateDead&&cl.dateDead>=oldStart)?plDiff(oldStart,cl.dateDead):0;
  PLAN_DRAG=null;
  let changed=false;
  if(idx!==oldStartIdx){
    cl.dateInstall=plAddDays(PLAN_START,idx);
    if(cl.dateDead)cl.dateDead=plAddDays(cl.dateInstall,dur);
    changed=true;
  }
  // перенос конкретной бригады: убираем источник, добавляем цель (остальные сохраняются)
  if(tgtBrig!==srcBrig){
    let brigs=clBrigs(cl).filter(b=>b!==srcBrig);
    if(tgtBrig&&!brigs.includes(tgtBrig))brigs.push(tgtBrig);
    cl.brigades=brigs;delete cl.brigade;
    changed=true;
  }
  if(changed){
    cl.updatedAt=Date.now();
    const blist=clBrigs(cl).join(', ')||'Без бригады';
    log(cl,`Планировщик: ${blist}, монтаж ${fds(cl.dateInstall)}`,'📋','#5b9bd5');
    save();renderPlanner();renderList();
    notify('ok','План обновлён',cname(cl)+' → '+blist);
  }else{renderPlanner();}
}

function plCellClick(rowIdx,iso){
  PLAN_QA={brig:plBrigKey(rowIdx),iso};
  const overlay=ge('modalOverlay'),mc=ge('modalContent');if(!overlay||!mc)return;
  mc.innerHTML=`<h3>📋 Добавить в план</h3>
    <div style="font-size:12px;color:var(--mu);margin-bottom:12px">${esc(PLAN_QA.brig||'Без бригады')} · ${fds(iso)}</div>
    <div class="field"><label>Объект</label>
      <select id="plqObj" onchange="ge('plqNameWrap').style.display=this.value?'none':''">
        <option value="">— Создать новый —</option>
        ${liveDB().map(c=>`<option value="${c.id}">${esc(cname(c))}${c.dateInstall?' · '+fds(c.dateInstall):''}</option>`).join('')}
      </select>
    </div>
    <div class="field" id="plqNameWrap"><label>Название нового объекта</label><input id="plqName" placeholder="Имя клиента / проект"></div>
    <div style="display:flex;gap:8px;margin-top:16px">
      <button class="modal-btn primary" onclick="plQuickSave()">Добавить</button>
      <button class="modal-btn secondary" onclick="ge('modalOverlay').classList.add('hidden')">Отмена</button>
    </div>`;
  overlay.classList.remove('hidden');
}
function plQuickSave(){
  if(!PLAN_QA)return;
  const brig=PLAN_QA.brig, iso=PLAN_QA.iso;
  const sel=ge('plqObj')?.value;
  let cl;
  if(sel){cl=DB.find(c=>c.id===sel);if(!cl)return;}
  else{cl=mkObj();cl.projectName=(ge('plqName')?.value||'').trim();DB.unshift(cl);}
  if(brig){const set=new Set(clBrigs(cl));set.add(brig);cl.brigades=[...set];delete cl.brigade;}
  cl.dateInstall=iso;if(!cl.dateDead)cl.dateDead=iso;
  cl.updatedAt=Date.now();
  log(cl,`Запланирован: ${clBrigs(cl).join(', ')||'Без бригады'}, ${fds(iso)}`,'📋','#5b9bd5');
  save();renderList();
  ge('modalOverlay').classList.add('hidden');PLAN_QA=null;
  renderPlanner();
  notify('ok','Добавлено в план',cname(cl));
}

// CALENDAR VIEW
// ═══════════════════════════════════════════════
let CAL_YEAR=new Date().getFullYear();
let CAL_MONTH=new Date().getMonth();

function showCalendar(){
  VIEW='calendar';setNav('cal');sbHide();
  renderCalendarView();
}

function renderCalendarView(){
  const mc=ge('main');
  const today=new Date().toISOString().split('T')[0];
  const monthNames=['Январь','Февраль','Март','Апрель','Май','Июнь',
    'Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  const dayNames=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];

  // Собираем события месяца
  const y=CAL_YEAR,m=CAL_MONTH;
  const first=new Date(y,m,1);
  const last=new Date(y,m+1,0);
  const daysInMonth=last.getDate();

  // Собираем все события по датам
  const events={};
  function addEv(dateStr,icon,label,cid,color){
    if(!dateStr||!dateStr.startsWith(`${y}-${(m+1).toString().padStart(2,'0')}`))return;
    if(!events[dateStr])events[dateStr]=[];
    events[dateStr].push({icon,label,cid,color});
  }
  liveDB().forEach(cl=>{
    const n=cname(cl);
    addEv(cl.dateMeasure,'📐',n,cl.id,'var(--in)');
    addEv(cl.dateInstall,'🔧',n,cl.id,'var(--ok)');
    addEv(cl.dateProd,'🏭',n,cl.id,'var(--pu)');
    addEv(cl.dateDead,'🏁',n,cl.id,'var(--wn)');
    (cl.tasks||[]).forEach(t=>{
      if(t.deadline&&!t.done) addEv(t.deadline,'✅',`${t.text} (${n})`,cl.id,'var(--ac)');
    });
  });

  // Генерируем сетку
  let startDay=(first.getDay()+6)%7; // Пн=0
  let cells=[];
  for(let i=0;i<startDay;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(d);
  while(cells.length%7!==0) cells.push(null);

  const gridRows=[];
  for(let i=0;i<cells.length;i+=7){
    gridRows.push(cells.slice(i,i+7));
  }

  mc.innerHTML=`<div style="flex:1;overflow:hidden;display:flex;flex-direction:column;background:var(--bg)">
    <!-- Toolbar -->
    <div class="kb-bar" style="flex-shrink:0">
      <button class="vsw" onclick="CAL_MONTH--;if(CAL_MONTH<0){CAL_MONTH=11;CAL_YEAR--;}renderCalendarView()">◀</button>
      <span style="font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--tx);margin:0 12px">
        ${monthNames[m]} ${y}
      </span>
      <button class="vsw" onclick="CAL_MONTH++;if(CAL_MONTH>11){CAL_MONTH=0;CAL_YEAR++;}renderCalendarView()">▶</button>
      <button class="vsw" style="margin-left:8px" onclick="CAL_YEAR=new Date().getFullYear();CAL_MONTH=new Date().getMonth();renderCalendarView()">Сегодня</button>
    </div>

    <!-- Calendar grid -->
    <div style="flex:1;overflow:auto;padding:0">
      <table style="width:100%;border-collapse:collapse;table-layout:fixed">
        <thead>

              const evs=events[dateStr]||[];

              return`<td style="border:1px solid var(--br);height:${window.innerWidth<600?'80':'110'}px;vertical-align:top;padding:4px;background:${isToday2?'rgba(200,169,110,.07)':isWe?'rgba(255,255,255,.01)':'var(--bg)'};cursor:pointer"

function calDayClick(dateStr){
  // Показываем все события этого дня + кнопку добавить задачу
  const overlay=ge('modalOverlay'),mc2=ge('modalContent');
  if(!overlay||!mc2)return;
  const p=pd(dateStr);
  const dateLabel=p?`${p.d} ${p.m} ${p.y} г.`:dateStr;

  // Собираем события дня
  const dayEvents=[];
  liveDB().forEach(cl=>{
    const n=cname(cl);
    if(cl.dateMeasure===dateStr) dayEvents.push({icon:'📐',label:'Замер: '+n,cid:cl.id,color:'var(--in)'});
    if(cl.dateInstall===dateStr) dayEvents.push({icon:'🔧',label:'Монтаж: '+n,cid:cl.id,color:'var(--ok)'});
    if(cl.dateProd===dateStr) dayEvents.push({icon:'🏭',label:'Производство: '+n,cid:cl.id,color:'var(--pu)'});
    if(cl.dateDead===dateStr) dayEvents.push({icon:'🏁',label:'Сдача: '+n,cid:cl.id,color:'var(--wn)'});
    (cl.tasks||[]).forEach((t,i)=>{
      if(t.deadline===dateStr){
        dayEvents.push({icon:t.done?'☑':'✅',label:`${t.text} (${n})`,cid:cl.id,color:'var(--ac)',taskIdx:i,done:t.done});
      }
    });
  });

  mc2.innerHTML=`<h3>📅 ${dateLabel}</h3>
    ${dayEvents.length===0?'<div style="color:var(--mu);font-size:12px;margin-bottom:16px">Событий нет</div>':
      dayEvents.map(ev=>`<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--br)">
        <span style="font-size:16px">${ev.icon}</span>
        <span style="flex:1;font-size:13px;color:var(--tx2)">${ev.label}</span>
        <button class="kact" onclick="ge('modalOverlay').classList.add('hidden');openObj('${ev.cid}')">→</button>
      </div>`).join('')}
    <div style="margin-top:16px;display:flex;gap:8px">
      <button class="modal-btn primary" onclick="ge('modalOverlay').classList.add('hidden');calAddTask('${dateStr}')">+ Задача на этот день</button>
      <button class="modal-btn secondary" onclick="ge('modalOverlay').classList.add('hidden')">Закрыть</button>
    </div>`;
  overlay.classList.remove('hidden');
}

function calAddTask(dateStr){
  showAddTaskModal();
  setTimeout(()=>{const d=ge('atDate');if(d)d.value=dateStr;},50);
}

function doExport(){
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`parallax_${new Date().toISOString().slice(0,10)}.json`;a.click();
  notify('ok','Экспорт','Резервная копия скачана');
}
function checkAlerts(){
  const today=new Date().toISOString().split('T')[0];
  const ti=liveDB().filter(c=>c.dateInstall===today&&!['closed','done','cancel'].includes(c.status));
  const tm=liveDB().filter(c=>c.dateMeasure===today&&!['closed','done','cancel'].includes(c.status));
  const ov=liveDB().filter(c=>isLate(c.dateInstall)&&!['closed','done','cancel'].includes(c.status));
  const cl=liveDB().filter(c=>c.status==='claim');
  const overdueTasks=liveDB().filter(c=>(c.tasks||[]).some(t=>!t.done&&t.deadline&&isLate(t.deadline)));
  if(ti.length)notify('warn','🔧 Монтажи сегодня',ti.map(c=>cname(c)).join(', '));
  if(tm.length)notify('info','📐 Замеры сегодня',tm.map(c=>cname(c)).join(', '));
  if(ov.length)notify('err','⚠ Просрочен монтаж',`${ov.length} объект(ов)`);
  if(cl.length)notify('err','🔴 Рекламации',`${cl.length} активных`);
  if(overdueTasks.length)notify('warn','📋 Просрочены задачи',`${overdueTasks.length} объект(ов) с просроченными задачами`);
}

function toggleTheme(){
  const next=document.documentElement.dataset.theme==='light'?'dark':'light';
  document.documentElement.dataset.theme=next;
  localStorage.setItem('px_theme',next);
  const btn=ge('themeBtn');
  if(btn)btn.textContent=next==='light'?'🌙':'☀️';
}
(function applyTheme(){
  const t=localStorage.getItem('px_theme')||'dark';
  document.documentElement.dataset.theme=t;
  // Кнопка обновится после рендера DOM — через requestAnimationFrame
  requestAnimationFrame(()=>{
    const btn=ge('themeBtn');
    if(btn)btn.textContent=t==='light'?'🌙':'☀️';
  });
})();

// Service Worker для офлайн-режима
// Service Worker для офлайн-режима
if('serviceWorker' in navigator && location.protocol !== 'file:' && location.protocol !== 'blob:'){
  const swCode=`
    const CACHE='parallax-crm-v3';
    self.addEventListener('install',e=>{
      self.skipWaiting();
    });
    self.addEventListener('activate',e=>{
      e.waitUntil(
        caches.keys().then(keys=>Promise.all(
          keys.filter(k=>k!=='parallax-crm-v3').map(k=>caches.delete(k))
        )).then(()=>clients.claim())
      );
    });
    self.addEventListener('fetch',e=>{
      if(e.request.method!=='GET')return;
      if(e.request.url.includes('script.google.com'))return;
      e.respondWith(
        fetch(e.request).then(resp=>{
          if(resp.ok){
            const clone=resp.clone();
            caches.open('parallax-crm-v3').then(c=>c.put(e.request,clone));
          }
          return resp;
        }).catch(()=>caches.match(e.request).then(r=>r||new Response('Офлайн',{status:503})))
      );
    });
  `;
  try{
    const blob=new Blob([swCode],{type:'application/javascript'});
    const swUrl=URL.createObjectURL(blob);
    navigator.serviceWorker.register(swUrl).then(reg=>{
      console.log('SW ok');
      // Кешируем текущую страницу
      if(reg.installing){
        caches.open('parallax-crm-v3').then(c=>c.add(location.href));
      }
    }).catch(e=>console.warn('SW:',e));
  }catch(e){console.warn('SW blob error:',e);}
}
